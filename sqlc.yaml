version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/users"
    schema: "db/migrations"
    gen:
      go:
        package: "usersdb"
        out: "internal/users/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - db_type: "user_role"
            go_type: "string"
          - db_type: "email_status"
            go_type: "string"